name: Rilascio Pacchetti NuGet

on:
  push:
    branches: [ main ]
    paths:
      - 'OrderService/**'
      - 'InventoryService/**'
      - 'NotificationService/**'

jobs:
  check-and-publish:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
    - name: Checkout del codice
      uses: actions/checkout@v3
      with:
        fetch-depth: 2 # Necessario per controllare i file modificati nell'ultimo commit

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0.x' # Cambia con la versione .NET che usi (es. 7.0 o 8.0)

    # Verifica quali file sono cambiati
    - name: Get changed files
      id: changed-files
      uses: tj-actions/changed-files@v39

    # ==========================================
    # WORKFLOW PER ORDER SERVICE
    # ==========================================
    - name: Build e Publish Order NuGets
      if: contains(steps.changed-files.outputs.any_changed, 'OrderService/')
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Token automatico fornito da GitHub
      run: |
        echo "Modifiche rilevate in OrderService. Generazione pacchetti..."
        
        # Genera il pacchetto per Shared
        dotnet pack OrderService/Order.Shared/Order.Shared.csproj -c Release -o ./out
        # Genera il pacchetto per ClientHttp
        dotnet pack OrderService/Order.ClientHttp/Order.ClientHttp.csproj -c Release -o ./out
        
        # Push di tutti i pacchetti generati sul registro GitHub
        dotnet nuget push "./out/*.nupkg" --source "GitHub" --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate

    # ==========================================
    # WORKFLOW PER INVENTORY SERVICE
    # ==========================================
    - name: Build e Publish Inventory NuGets
      if: contains(steps.changed-files.outputs.any_changed, 'InventoryService/')
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        echo "Modifiche rilevate in InventoryService. Generazione pacchetti..."
        dotnet pack InventoryService/Inventory.Shared/Inventory.Shared.csproj -c Release -o ./out_inv
        dotnet pack InventoryService/Inventory.ClientHttp/Inventory.ClientHttp.csproj -c Release -o ./out_inv
        dotnet nuget push "./out_inv/*.nupkg" --source "GitHub" --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate

    # ==========================================
    # WORKFLOW PER NOTIFICATION SERVICE
    # ==========================================
    - name: Build e Publish Notification NuGets
      if: contains(steps.changed-files.outputs.any_changed, 'NotificationService/')
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        echo "Modifiche rilevate in NotificationService. Generazione pacchetti..."
        dotnet pack NotificationService/Notification.Shared/Notification.Shared.csproj -c Release -o ./out_notif
        dotnet pack NotificationService/Notification.ClientHttp/Notification.ClientHttp.csproj -c Release -o ./out_notif
        dotnet nuget push "./out_notif/*.nupkg" --source "GitHub" --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate
