# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: NuGet-PaymentService
on:
  push:
    tags: [ "v*" ]
  workflow_dispatch:
jobs:
  publish_nuget:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: PaymentService
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore PaymentService.slnx

      - name: Build
        run: dotnet build --no-restore PaymentService.slnx

      - name: Test
        run: dotnet test --no-build --verbosity normal PaymentService.slnx

      - name: Build release
        run: dotnet build --configuration Release --no-restore PaymentService.slnx

      - name: Pack
        run: dotnet pack --no-restore --configuration Release PaymentService.slnx

      - name: Push
        run: |
          dotnet nuget push "*/bin/Release/*.nupkg" \
            --source "https://nuget.pkg.github.com/FedericoBecchi2003/index.json" \
            --skip-duplicate \
            --api-key ${{ secrets.GITHUB_TOKEN }}
