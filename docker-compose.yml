version: '3.8'

services:
  # --- 1. ORDER SERVICE & DB ---
  order-db:
    image: postgres:15-alpine
    container_name: order-postgres
    environment:
      POSTGRES_USER: ecommerce_user
      POSTGRES_PASSWORD: SecurePassword123!
      POSTGRES_DB: order_db
    ports:
      - "5431:5432"
    volumes:
      - order_db_data:/var/lib/postgresql/data

  order-api:
    container_name: order-service
    image: ${DOCKERHUB_USERNAME}/warehouse-order-service:${ORDER_SERVICE_TAG:-latest}
    build:
      context: .
      dockerfile: OrderService/Dockerfile
      args:
        - GITHUB_TOKEN=${GITHUB_TOKEN}
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=order-db;Database=order_db;Username=ecommerce_user;Password=SecurePassword123!
      - Kafka__BootstrapServers=kafka:29092
    depends_on:
      - order-db
      - kafka

  # --- 2. WAREHOUSE SERVICE & DB ---
  warehouse-db:
    image: postgres:15-alpine
    container_name: warehouse-postgres
    environment:
      POSTGRES_USER: ecommerce_user
      POSTGRES_PASSWORD: SecurePassword123!
      POSTGRES_DB: warehouse_db
    ports:
      - "5432:5432"
    volumes:
      - warehouse_db_data:/var/lib/postgresql/data

  warehouse-api:
    container_name: warehouse-service
    image: ${DOCKERHUB_USERNAME}/warehouse-warehouse-service:${WAREHOUSE_SERVICE_TAG:-latest}
    build:
      context: .
      dockerfile: WarehouseService/Dockerfile
      args:
        - GITHUB_TOKEN=${GITHUB_TOKEN}
    ports:
      - "5002:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=warehouse-db;Database=warehouse_db;Username=ecommerce_user;Password=SecurePassword123!
      - Kafka__BootstrapServers=kafka:29092
    depends_on:
      - warehouse-db
      - kafka

  # --- 3. PAYMENT SERVICE & DB ---
  payment-db:
    image: postgres:15-alpine
    container_name: payment-postgres
    environment:
      POSTGRES_USER: ecommerce_user
      POSTGRES_PASSWORD: SecurePassword123!
      POSTGRES_DB: payment_db
    ports:
      - "5433:5432"
    volumes:
      - payment_db_data:/var/lib/postgresql/data

  payment-api:
    container_name: payment-service
    image: ${DOCKERHUB_USERNAME}/warehouse-payment-service:${PAYMENT_SERVICE_TAG:-latest}
    build:
      context: .
      dockerfile: PaymentService/Dockerfile
      args:
        - GITHUB_TOKEN=${GITHUB_TOKEN}
    ports:
      - "5003:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=payment-db;Database=payment_db;Username=ecommerce_user;Password=SecurePassword123!
      - Kafka__BootstrapServers=kafka:29092
    depends_on:
      - payment-db
      - kafka

  # --- 4. MESSAGE BROKER (KAFKA KRaft) ---
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: ecommerce-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REREPLICATION_FACTOR: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'

volumes:
  order_db_data:
  warehouse_db_data:
  payment_db_data: