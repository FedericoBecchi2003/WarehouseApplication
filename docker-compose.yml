version: '3.8'

services:
  # DATABASE PER ORDINI
  # MICROSERVIZIO ORDINI
  order-api:
    image: ghcr.io/TUO_USERNAME_GITHUB/order-api:latest
    container_name: order-api
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      # Sovrascriviamo le stringhe di connessione per puntare ai container, non a localhost
      - ConnectionStrings__DefaultConnection=Host=order-db;Database=order_db;Username=ecommerce_user;Password=SecurePassword123!
      - Kafka__BootstrapServers=kafka:29092
    depends_on:
      - order-db
      - kafka

  # MICROSERVIZIO MAGAZZINO
  inventory-api:
    image: ghcr.io/TUO_USERNAME_GITHUB/inventory-api:latest
    container_name: inventory-api
    ports:
      - "5002:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=inventory-db;Database=inventory_db;Username=ecommerce_user;Password=SecurePassword123!
      - Kafka__BootstrapServers=kafka:29092
    depends_on:
      - inventory-db
      - kafka

  # DATABASE PER MAGAZZINO
  inventory-db:
    image: postgres:15-alpine
    container_name: inventory-postgres
    environment:
      POSTGRES_USER: ecommerce_user
      POSTGRES_PASSWORD: SecurePassword123!
      POSTGRES_DB: inventory_db
    ports:
      - "5432:5432"
    volumes:
      - inventory_db_data:/var/lib/postgresql/data

  # DATABASE PER NOTIFICHE/TERZO SERVIZIO
  notification-db:
    image: postgres:15-alpine
    container_name: notification-postgres
    environment:
      POSTGRES_USER: ecommerce_user
      POSTGRES_PASSWORD: SecurePassword123!
      POSTGRES_DB: notification_db
    ports:
      - "5433:5432"
    volumes:
      - notification_db_data:/var/lib/postgresql/data

  # KAFKA (Modalità KRaft - No Zookeeper)
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: ecommerce-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REREPLICATION_FACTOR: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'

volumes:
  order_db_data:
  inventory_db_data:
  notification_db_data: